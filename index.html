<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tableau IAG Collaboratif</title>
<style>
body { font-family: Arial; margin: 20px; }
h2 { margin-top: 30px; }
table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
th, td { border: 1px solid #ccc; padding: 8px; }
td { min-height: 40px; }
[contenteditable="true"] { background: #f9f9f9; }
button { margin: 5px; padding: 8px 12px; }
.dropzone { border: 2px dashed #aaa; padding: 10px; text-align: center; }
</style>
</head>
<body>

<h1>Tableau IAG Collaboratif</h1>

<div id="sections"></div>

<button onclick="exportJSON()">Exporter JSON</button>
<button onclick="importJSON()">Importer JSON</button>
<button onclick="exportExcel()">Exporter Excel</button>

<input type="file" id="fileInput" style="display:none" onchange="handleImport(event)">

<script>
const sectionTitles = [
"PRATIQUE 1 - scénario avec une IAG",
"PRATIQUE 2 - Différencier avec une IAG",
"PRATIQUE 3 - Différencier avec une IAG - Podcast, mappe conceptuelle, activités interactives",
"PRATIQUE 4 - Synthèse vidéo avec IA et résumé graphique",
"PRATIQUE 5 - Développer un outil à l'aide d'une IAG"
];

function createTable(id) {
    const container = document.getElementById("sections");
    const div = document.createElement("div");
    div.innerHTML = `<h2>${sectionTitles[id]}</h2>
    <table id="table-${id}">
    <tr>
    <th>IA EMPLOYÉE</th>
    <th>AVANTAGES</th>
    <th>LIMITES</th>
    <th>USAGE PÉDAGOGIQUE</th>
    <th>PROMPTS EMPLOYÉS</th>
    </tr>
    </table>
    <button onclick="addRow(${id})">Ajouter une ligne</button>`;
    container.appendChild(div);
}

function addRow(id, data=[]) {
    const table = document.getElementById(`table-${id}`);
    const row = table.insertRow();
    for(let i=0;i<5;i++){
        const cell = row.insertCell();
        if(i<4){
            cell.contentEditable = true;
            cell.innerText = data[i] || "";
        } else {
            cell.innerHTML = `<div class="dropzone">Déposer fichier</div>`;
        }
    }
    saveData();
}

function saveData(){
    const allData = [];
    sectionTitles.forEach((_,id)=>{
        const table = document.getElementById(`table-${id}`);
        const rows = Array.from(table.rows).slice(1);
        const sectionData = rows.map(r=>{
            return Array.from(r.cells).slice(0,4).map(c=>c.innerText);
        });
        allData.push(sectionData);
    });
    localStorage.setItem("tableData", JSON.stringify(allData));
}

function loadData(){
    const data = JSON.parse(localStorage.getItem("tableData")||"[]");
    data.forEach((section,id)=>{
        section.forEach(row=>addRow(id,row));
    });
}

function exportJSON(){
    const data = localStorage.getItem("tableData");
    const blob = new Blob([data], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "tableau_iag.json";
    a.click();
}

function importJSON(){
    document.getElementById("fileInput").click();
}

function handleImport(e){
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function(){
        localStorage.setItem("tableData", reader.result);
        location.reload();
    };
    reader.readAsText(file);
}

function exportExcel(){
    let csv = "";
    sectionTitles.forEach((title,id)=>{
        csv += title + "\n";
        const table = document.getElementById(`table-${id}`);
        const rows = Array.from(table.rows);
        rows.forEach(r=>{
            const cols = Array.from(r.cells).map(c=>c.innerText);
            csv += cols.join(";") + "\n";
        });
        csv += "\n";
    });
    const blob = new Blob([csv], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "tableau_iag.csv";
    a.click();
}

sectionTitles.forEach((_,i)=>createTable(i));
loadData();

document.addEventListener("input", saveData);
</script>

</body>
</html>
